# Use "screen-256color" if you get warning about terminal not fully functional.
#
# It is the best widely-available option for TERM in Tmux but lacks support for
# Tmux background-color-erase and status line features.
#
# `tmux-256color` is a more accurate definition for Tmux but its newer so older
# systems make lack support for it.
set -s default-terminal "xterm-256color"
# Advertise truecolor (RGB) to the real client by its own TERM. Without this tmux
# drove the Ghostty client (TERM xterm-ghostty) with no RGB capability, so it
# quantized colors and emitted an inconsistent erase model -- which corrupted the
# window-status soft-divider caps on partial (unfocused-tab) redraws and only a
# full re-layout (window switch) cleared it. Matched by the client's own TERM via
# an `xterm*` glob, so it's a harmless no-op on non-xterm terminals. RGB is
# negotiated at attach time: re-attach (or restart the server) to pick it up.
set -ag terminal-features ",xterm*:RGB"

# Reduce escape time to zero to allow for faster key entry after entering command.
set -s escape-time 0

# Automatically set window titles.
set-window-option -g automatic-rename on
set-option -g set-titles on

# Renumber window numbers when a window is closed.
set-option -g renumber-windows on

# Start counting from one rather than zero (lines up with keyboard 1-9, 0)
set -g base-index 1
set -g pane-base-index 1

# Use shift left/right/up/down to navigate panes
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Use ctrl shift left, shift right to move between windows.
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Prefix + Shift C is kill window (opposite of prefix + c)
unbind C
bind C kill-window

# Replace tmux prefix with CTRL+space
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# Split windows with h (horizontal) and v (vertical)
bind h split-window -h
bind v split-window -v

# Enable mouse support
set -g mouse on

# Reload tmux config with prefix + r
bind r source-file ~/.tmux.conf \; display-message ".tmux.conf reloaded"

#--------------------------------------------------------------------------------------------------#
# Status bar config                                                                                #
#--------------------------------------------------------------------------------------------------#
set -g @SB_BG black
set -g @SB_FG brightwhite
set -g @SB_HOSTNAME_BG green
set -g @SB_HOSTNAME_FG black
set -g @SB_SESSNAME_BG yellow
set -g @SB_SESSNAME_FG black
set -g @SB_ACTIVE_WIN_BG brightmagenta
set -g @SB_ACTIVE_WIN_FG brightblack
set -g @SB_INACTIVE_WIN_BG brightblack
set -g @SB_INACTIVE_WIN_FG brightwhite

# NOTE: Look up prefix `e0` at https://www.nerdfonts.com/cheat-sheet
set -g @SB_LEFT_SPLIT_CHAR 

#--------------------------------------------------------------------------------------------------#
# Claude Code per-window state icons                                                               #
#--------------------------------------------------------------------------------------------------#
# bin/claude-tmux-state (driven by Claude Code hooks) pushes @claude_state and
# @claude_since onto each window; the window-status formats below render a small
# colored Nerd Font icon from them. Idle/present windows render nothing. Tweak
# glyphs/colors here -- color carries more signal than the glyph in a row of tabs.
set -g @CL_WORK_ICON ""        # U+F0E7 bolt      working (thinking or running a command)
set -g @CL_IDLE_ICON ""        # U+E32B moon      session present but idle (solid crescent)
set -g @CL_WAIT_ICON ""        # U+F128 question  waiting for your input
set -g @CL_PERM_ICON ""        # U+F023 lock      waiting for tool approval
set -g @CL_WAITING_ICON ""     # U+F017 clock     blocked on an external event
set -g @CL_WORK_FG cyan         # working, fresh
set -g @CL_SLOW_FG colour208    # working, past @CL_SLOW_AFTER (orange)
set -g @CL_IDLE_FG colour244    # idle, muted grey
set -g @CL_WAIT_FG brightred
set -g @CL_PERM_FG brightmagenta
set -g @CL_WAITING_FG blue
set -g @CL_SLOW_AFTER 30         # working color escalates cyan -> orange after N seconds
set -g @CL_STALE_AFTER 900       # hide a stuck working icon after N seconds

#--------------------------------------------------------------------------------------------------#
# Dynamic status values                                                                            #
#--------------------------------------------------------------------------------------------------#
# shortened hostname
run-shell 'tmux set -g @SB_HOSTNAME "$(shostname)"'

# OS icon
run-shell 'tmux set -g @SB_OS_ICON "$(print-status os)"'

# SSH icon
run-shell 'tmux set -g @SB_SSH_ICON "$(print-status ssh)"'

#--------------------------------------------------------------------------------------------------#
# Status bar layout                                                                                #
#--------------------------------------------------------------------------------------------------#
set -g status-position top
set -g status-style bg="#{@SB_BG}",fg="#{@SB_FG}"

## Window status format.
# default format (e.g., non-active)
setw -g window-status-format "\
#[bg=#{@SB_BG},fg=#{@SB_INACTIVE_WIN_BG}]\
\
#[bg=#{@SB_INACTIVE_WIN_BG},fg=#{@SB_INACTIVE_WIN_FG}]\
#{?@claude_state,#{?#{&&:#{||:#{==:#{@claude_state},busy},#{==:#{@claude_state},running}},#{e|>:#{e|-:%s,#{@claude_since}},#{@CL_STALE_AFTER}}},,#{?#{||:#{==:#{@claude_state},busy},#{==:#{@claude_state},running}},#{?#{e|>:#{e|-:%s,#{@claude_since}},#{@CL_SLOW_AFTER}}, #[fg=#{@CL_SLOW_FG}]#{@CL_WORK_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] , #[fg=#{@CL_WORK_FG}]#{@CL_WORK_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] },#{?#{==:#{@claude_state},needs-input}, #[fg=#{@CL_WAIT_FG}]#{@CL_WAIT_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] ,#{?#{==:#{@claude_state},needs-perm}, #[fg=#{@CL_PERM_FG}]#{@CL_PERM_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] ,#{?#{==:#{@claude_state},waiting}, #[fg=#{@CL_WAITING_FG}]#{@CL_WAITING_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] ,#{?#{||:#{==:#{@claude_state},idle},#{==:#{@claude_state},present}}, #[fg=#{@CL_IDLE_FG}]#{@CL_IDLE_ICON}#[fg=#{@SB_INACTIVE_WIN_FG}] ,}}}}}},}\
#I·#W\
#{?window_bell_flag,!,}\
#{?window_zoomed_flag,,}\
#{?window_activity_flag,@,}\
#{?window_marked_flag,,}\
#[bg=#{@SB_BG},fg=#{@SB_INACTIVE_WIN_BG}]\
\
#[default]\
"

# active window format
setw -g window-status-current-format "\
#[bg=#{@SB_BG},fg=#{@SB_ACTIVE_WIN_BG}]\
\
#[bg=#{@SB_ACTIVE_WIN_BG},fg=#{@SB_ACTIVE_WIN_FG}]\
#{?@claude_state,#{?#{&&:#{||:#{==:#{@claude_state},busy},#{==:#{@claude_state},running}},#{e|>:#{e|-:%s,#{@claude_since}},#{@CL_STALE_AFTER}}},,#{?#{||:#{==:#{@claude_state},busy},#{==:#{@claude_state},running}},#{?#{e|>:#{e|-:%s,#{@claude_since}},#{@CL_SLOW_AFTER}}, #[fg=#{@CL_SLOW_FG}]#{@CL_WORK_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] , #[fg=#{@CL_WORK_FG}]#{@CL_WORK_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] },#{?#{==:#{@claude_state},needs-input}, #[fg=#{@CL_WAIT_FG}]#{@CL_WAIT_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] ,#{?#{==:#{@claude_state},needs-perm}, #[fg=#{@CL_PERM_FG}]#{@CL_PERM_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] ,#{?#{==:#{@claude_state},waiting}, #[fg=#{@CL_WAITING_FG}]#{@CL_WAITING_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] ,#{?#{||:#{==:#{@claude_state},idle},#{==:#{@claude_state},present}}, #[fg=#{@CL_IDLE_FG}]#{@CL_IDLE_ICON}#[fg=#{@SB_ACTIVE_WIN_FG}] ,}}}}}},}\
#I·#W\
#{?window_bell_flag,!,}\
#{?window_zoomed_flag,,}\
#{?window_activity_flag,@,}\
#{?window_marked_flag,,}\
#[bg=#{@SB_BG},fg=#{@SB_ACTIVE_WIN_BG}]\
\
#[default]\
"

setw -g window-status-separator " "

# Don't let tmux restyle a tab when its window has a pending bell/activity. By
# default tmux applies window-status-bell-style (reverse) to a window's tab while
# it has an unseen bell; reverse-video swaps the fg/bg this status bar sets per
# tab, so a bell'd tab (e.g. a Claude session ringing the terminal bell when it
# goes idle) rendered with inverted soft-divider caps and wrong colors until the
# window was focused (focusing clears the bell). "default" makes tmux's status
# format skip the restyle; the bell is still shown by the flag after the name.
set -g window-status-bell-style default
set -g window-status-activity-style default

## Left status bar
set -g status-left-length 100
set -g status-left "\
#[bg=#{@SB_HOSTNAME_BG},fg=#{@SB_HOSTNAME_FG}]\
#{?client_prefix,#[fg=red],\u00A0}\
#{@SB_OS_ICON} #[bold]#{@SB_HOSTNAME} \
#[bg=#{@SB_SESSNAME_BG},fg=#{@SB_HOSTNAME_BG}]#{@SB_LEFT_SPLIT_CHAR}\
#[default]\
#[bg=#{@SB_SESSNAME_BG},fg=#{@SB_SESSNAME_FG}] #{@SB_SSH_ICON} #[bold]#S \
#[bg=#{@SB_BG},fg=#{@SB_SESSNAME_BG}]#{@SB_LEFT_SPLIT_CHAR}\
#[default]\
"

## Right status bar.
# upcoming meeting (or weather fallback) | time.
set -g status-right-length 60
set -g status-right "\
#(tmux-right-status)\
%b %d %Y %H:%M\
"

## Center status bar (window titles).
set -g status-justify centre

## Load any machine specific settings that are not version controlled.
if-shell "[ -f ~/.my_tmux.conf ]" 'source ~/.my_tmux.conf'
