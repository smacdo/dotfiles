name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Lint
        run: python3 lint_all.py

      - name: Test
        run: python3 run_tests.py --no-docker

  run-integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v5

      - name: Integration tests
        run: python3 run_tests.py --docker-only

  macos-integration:
    runs-on: macos-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v5

      - name: Install vim and neovim
        run: |
          command -v vim >/dev/null || brew install vim
          brew install neovim

      - name: Link dotfiles to HOME
        run: ln -s "$GITHUB_WORKSPACE" "$HOME/.dotfiles"

      - name: Bootstrap (run twice for idempotency)
        run: |
          for _ in 1 2; do
            python3 bootstrap.py -v \
              --git-name 'Testy McTestFace' \
              --git-email 'testy@test.com' \
              --weather-location 'Seattle' \
              < /dev/null
          done

      - name: Native integration tests
        run: python3 run_tests.py --native-only
